<!DOCTYPE html>
<html>
<head>
<title>To Do List</title>
</head>
<body>

<h1>My To Do List</h1>

<input type="text" id="task">
<button onclick="addTask()">Add</button>

<ul id="list"></ul>

<script>

function addTask(){

let task=document.getElementById("task").value;

let li=document.createElement("li");

li.innerText=task;

document.getElementById("list").appendChild(li);

}


</script>

</body>
